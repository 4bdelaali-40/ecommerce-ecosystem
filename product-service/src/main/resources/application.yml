server:
  port: 8081

spring:
  application:
    name: product-service
  config:
    import: optional:configserver:http://admin:admin@localhost:8888
  data:
    mongodb:
      uri: mongodb://localhost:27017/productdb
    redis:
      host: localhost
      port: 6379

eureka:
  client:
    service-url:
      defaultZone: http://admin:admin@localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info