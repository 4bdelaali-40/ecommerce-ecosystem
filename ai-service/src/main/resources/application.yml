server:
  port: 8086

spring:
  application:
    name: ai-service
  config:
    import: optional:configserver:http://admin:admin@localhost:8888

eureka:
  client:
    service-url:
      defaultZone: http://admin:admin@localhost:8761/eureka/
  instance:
    prefer-ip-address: true

claude:
  api:
    key: ${CLAUDE_API_KEY:your-claude-api-key-here}
    model: claude-3-5-sonnet-20241022

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans