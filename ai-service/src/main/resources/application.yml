server:
  port: 8086

spring:
  application:
    name: ai-service
  config:
    import: optional:configserver:http://admin:admin@localhost:8888

eureka:
  client:
    service-url:
      defaultZone: http://admin:admin@localhost:8761/eureka/
  instance:
    prefer-ip-address: true

groq:
  api:
    key: ${GROQ_API_KEY:your-groq-api-key-here}
    model: llama-3.1-8b-instant

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans